<section class="seredo-partners-section">
  
  <style>
    .seredo-partners-section{
      width:100%;
      background:#f7f9fc;
      padding:40px 0;
      font-family:"IBM Plex Sans Arabic", sans-serif;
      overflow:hidden;
    }

    .seredo-title{
      text-align:center;
      font-size:28px;
      font-weight:900;
      color:#25396e;
      margin-bottom:25px;
    }

    /* الشريط */
    .seredo-marquee{
      overflow:hidden;
      position:relative;
      width:100%;
    }

    .seredo-track{
      display:flex;
      gap:70px;
      width:max-content;
      animation:scroll 25s linear infinite;
      align-items:center;
    }

    .seredo-track:hover{
      animation-play-state:paused;
    }

    .seredo-track img{
      height:70px;
      width:auto;
      object-fit:contain;
      transition:0.3s ease;
      filter:grayscale(0%);
    }

    .seredo-track img:hover{
      transform:scale(1.1);
    }

    @keyframes scroll{
      0%{transform:translateX(0);}
      100%{transform:translateX(-50%);}
    }

    /* موبايل */
    @media(max-width:768px){
      .seredo-track img{
        height:50px;
      }
      .seredo-title{
        font-size:22px;
      }
    }
  </style>

  <!-- العنوان -->
  <div class="seredo-title">
    شركاء الدورة الخامسة
  </div>

  <!-- الشريط المتحرك -->
  <div class="seredo-marquee">
    <div class="seredo-track">

      <img src="https://i.postimg.cc/44jm0sKT/AMLAK-FROM-GOOGLE.png" />

      <img src="https://i.postimg.cc/3rzdqYyY/EG-BLACK.png" />
      <img src="https://i.postimg.cc/dQgLfw7F/HOV-Global-Logo-Color-H.png" />
      <img src="https://i.postimg.cc/59D6rbHf/NHC-Logo-NTLGreen-H-CMYK.png" />
      <img src="https://i.postimg.cc/y62kGsJV/PAN-KINGDOM-LOGO-1.png" />
      <img src="https://seredoexpo.sa/wp-content/uploads/2026/06/Untitled-22-يونيو-2026-في-12.10.44.png" />
      <img src="https://i.postimg.cc/FFw76NfH/shʿar-mkywn-twly-mlwn.png" />

    </div>
  </div>

</section>
